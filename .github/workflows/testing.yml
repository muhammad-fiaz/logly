name: Testing

on:
  push:
    branches:
      - main
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: clippy
      - name: Run cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: rust-tests
      - name: Run cargo test
        run: cargo test --workspace

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  python-linting:
    name: Python Linting
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-key: lint
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: lint
      - name: Install Dependencies
        run: |
          uv sync --frozen --group dev
          uv run --group dev maturin develop
      - name: Ruff format check
        run: uv run --group dev ruff format logly tests --check
      - name: Lint with ruff
        run: uv run --group dev ruff check .
      - name: mypy check
        run: uv run --group dev mypy logly tests

  testing:
    name: Tests (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version:
          ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15.0-beta.3"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-key: test-${{ matrix.os }}-${{ matrix.python-version }}
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}-${{ matrix.python-version }}
      - name: Install Dependencies
        run: |
          uv sync --frozen --group dev --extra rich --extra fastapi --extra starlette --extra django --extra flask --extra gunicorn --extra sqlalchemy --extra structlog --extra opentelemetry --extra prometheus --extra elasticsearch --extra sentry --extra celery --extra uvicorn --extra redis --extra rabbitmq --extra mongodb --extra postgresql --extra discord --extra slack --extra apscheduler --extra rq --extra click --extra typer --extra compression --extra pydantic --extra tqdm --extra aws --extra gcloud --extra azure --extra newrelic
          uv run --group dev maturin develop
      - name: Test with pytest
        run: uv run --group dev pytest
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
