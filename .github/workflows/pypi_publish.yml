name: PyPI Publish

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  linux:
    name: Linux (${{ matrix.target }}, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        target: [x86_64, x86, aarch64, armv7, s390x, ppc64le]
        python-version:
          ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15.0-beta.3"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building version: $VERSION"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --compatibility off
          sccache: "true"
          manylinux: auto
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist

  windows:
    name: Windows (${{ matrix.target }}, Python ${{ matrix.python-version }})
    runs-on: windows-latest
    timeout-minutes: 25
    strategy:
      matrix:
        target: [x64, x86]
        python-version:
          ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15.0-beta.3"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.target }}
      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building version: $VERSION"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --compatibility off
          sccache: "true"
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist

  macos:
    name: macOS (${{ matrix.target }}, Python ${{ matrix.python-version }})
    runs-on: macos-latest
    timeout-minutes: 25
    strategy:
      matrix:
        target: [x86_64, aarch64]
        python-version:
          ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15.0-beta.3"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building version: $VERSION"
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --compatibility off
          sccache: "true"
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building version: $VERSION"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish-pypi:
    name: Publish to PyPI
    needs: [linux, windows, macos, sdist]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: List artifacts
        run: ls -la dist/
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Publish to PyPI
        run: uv publish dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.UV_PUBLISH_TOKEN }}

  upload-github-release:
    name: Upload wheels to GitHub Release
    needs: [linux, windows, macos, sdist]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

  update-release-notes:
    name: Update Release Notes
    needs: [publish-pypi, upload-github-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Update Release Body
        uses: softprops/action-gh-release@v3
        with:
          body: |
            ${{ github.event.release.body }}

            ---

            ## Installation

            ### pip

            ```bash
            pip install logly==${{ github.event.release.tag_name }}
            ```

            ### uv

            ```bash
            uv add logly==${{ github.event.release.tag_name }}
            ```

            ### From Source

            ```bash
            git clone https://github.com/muhammad-fiaz/logly.git
            cd logly
            git checkout ${{ github.event.release.tag_name }}
            uv sync
            uv run maturin develop
            ```

            ## Quick Start

            ```python
            from logly import logger

            logger.info("Hello from Logly!")
            logger.add("app.log", rotation="daily", retention="30 days", compression="gzip")
            logger.bind(user_id="12345").info("User logged in")

            with logger.catch():
                risky_operation()

            logger.complete()
            ```

            ## Links

            - [PyPI](https://pypi.org/project/logly/${{ github.event.release.tag_name }}/)
            - [Documentation](https://muhammad-fiaz.github.io/logly/)
            - [GitHub](https://github.com/muhammad-fiaz/logly)
            - [Changelog](https://github.com/muhammad-fiaz/logly/releases)
            - [Issue Tracker](https://github.com/muhammad-fiaz/logly/issues)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
