name: Release

permissions:
  contents: write

on:
  release:
    types: [published]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version:
          ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15.0-beta.3"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
      - name: Install Dependencies
        run: |
          uv sync --frozen --group dev --extra rich --extra fastapi --extra starlette --extra django --extra flask --extra gunicorn --extra sqlalchemy --extra structlog --extra opentelemetry --extra prometheus --extra elasticsearch --extra sentry --extra celery --extra uvicorn --extra redis --extra rabbitmq --extra mongodb --extra postgresql --extra discord --extra slack --extra apscheduler --extra rq --extra click --extra typer --extra compression --extra pydantic --extra tqdm --extra aws --extra gcloud --extra azure --extra newrelic
          uv run --group dev maturin develop
      - name: Run Tests
        run: uv run --group dev pytest

  linux:
    name: Build Linux wheels (Python ${{ matrix.python-version }}, ${{ matrix.target }})
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        target: [x86_64, x86, aarch64, armv7, s390x, ppc64le]
        python-version:
          ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15.0-beta.3"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building version: $VERSION"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --compatibility off
          sccache: "true"
          manylinux: auto
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist

  windows:
    name: Build Windows wheels (Python ${{ matrix.python-version }}, ${{ matrix.target }})
    needs: [test]
    runs-on: windows-latest
    timeout-minutes: 25
    strategy:
      matrix:
        target: [x64, x86]
        python-version:
          ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15.0-beta.3"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.target }}
      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building version: $VERSION"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --compatibility off
          sccache: "true"
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist

  macos:
    name: Build macOS wheels (Python ${{ matrix.python-version }}, ${{ matrix.target }})
    needs: [test]
    runs-on: macos-latest
    timeout-minutes: 25
    strategy:
      matrix:
        target: [x86_64, aarch64]
        python-version:
          ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15.0-beta.3"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building version: $VERSION"
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --compatibility off
          sccache: "true"
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}-py${{ matrix.python-version }}
          path: dist

  sdist:
    name: Build source distribution
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building version: $VERSION"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  upload-release:
    name: Upload wheels to GitHub Release
    needs: [linux, windows, macos, sdist]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

  update-release:
    name: Update Release Description
    needs: [upload-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Update Release Body
        uses: softprops/action-gh-release@v3
        with:
          body: |
            ${{ github.event.release.body }}

            ---

            ## Documentation

            Full documentation: https://muhammad-fiaz.github.io/logly/

            - [Getting Started](https://muhammad-fiaz.github.io/logly/getting-started/)
            - [API Reference](https://muhammad-fiaz.github.io/logly/api-reference/logger/)
            - [Guides](https://muhammad-fiaz.github.io/logly/guides/sinks)
            - [Integrations](https://muhammad-fiaz.github.io/logly/integrations/)
            - [Examples](https://muhammad-fiaz.github.io/logly/examples/basic-logging)

            ## Installation

            ### pip

            ```bash
            pip install logly==${{ github.event.release.tag_name }}
            ```

            ### uv

            ```bash
            uv add logly==${{ github.event.release.tag_name }}
            ```

            ### From Source

            ```bash
            git clone https://github.com/muhammad-fiaz/logly.git
            cd logly
            git checkout ${{ github.event.release.tag_name }}
            uv sync
            uv run maturin develop
            ```

            ## Quick Start

            ```python
            from logly import logger

            logger.info("Hello from Logly!")
            logger.add("app.log", rotation="daily", retention="30 days", compression="gzip")
            logger.bind(user_id="12345").info("User logged in")

            with logger.catch():
                risky_operation()

            logger.complete()
            ```

            ## Links

            - [PyPI](https://pypi.org/project/logly/${{ github.event.release.tag_name }}/)
            - [GitHub](https://github.com/muhammad-fiaz/logly)
            - [Changelog](https://github.com/muhammad-fiaz/logly/releases)
            - [Issue Tracker](https://github.com/muhammad-fiaz/logly/issues)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
