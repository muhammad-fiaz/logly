name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "Breaking Changes"
    labels:
      - "breaking-change"
      - "breaking"
    collapse:
      after: "Features"
  - title: "Features"
    labels:
      - "enhancement"
      - "feature"
      - "new-feature"
    collapse:
      after: "Bug Fixes"
  - title: "Bug Fixes"
    labels:
      - "bug"
      - "fix"
      - "bugfix"
    collapse:
      after: "Improvements"
  - title: "Improvements"
    labels:
      - "improvement"
      - "enhancement"
      - "refactor"
      - "performance"
    collapse:
      after: "Documentation"
  - title: "Documentation"
    labels:
      - "documentation"
      - "docs"
      - "doc"
    collapse:
      after: "Dependencies"
  - title: "Dependencies"
    labels:
      - "dependencies"
      - "deps"
      - "skip-changelog"
    collapse:
      after: ""
exclude-labels:
  - "skip-changelog"
  - "dependencies"
version-resolver:
  major:
    labels:
      - "major"
      - "breaking-change"
      - "breaking"
  minor:
    labels:
      - "minor"
      - "enhancement"
      - "feature"
      - "new-feature"
  patch:
    labels:
      - "patch"
      - "bug"
      - "fix"
      - "bugfix"
      - "dependencies"
  default: patch
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'
no-changes-template: "No changes since last release."
template: |
  ## Changes

  $CHANGES

  ## Contributors

  $CONTRIBUTORS

  ---

  **Full Changelog**: https://github.com/muhammad-fiaz/logly/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
