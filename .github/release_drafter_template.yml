name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "Breaking Changes"
    when:
      - label:
          - "breaking-change"
          - "breaking"
    collapse:
      after: "Features"
  - title: "Features"
    when:
      - label:
          - "enhancement"
          - "feature"
          - "new-feature"
    collapse:
      after: "Bug Fixes"
  - title: "Bug Fixes"
    when:
      - label:
          - "bug"
          - "fix"
          - "bugfix"
    collapse:
      after: "Improvements"
  - title: "Improvements"
    when:
      - label:
          - "improvement"
          - "refactor"
          - "performance"
    collapse:
      after: "Documentation"
  - title: "Documentation"
    when:
      - label:
          - "documentation"
          - "docs"
          - "doc"
    collapse:
      after: "Dependencies"
  - title: "Dependencies"
    when:
      - label:
          - "dependencies"
          - "deps"
    collapse:
      after: ""
  - type: pre-exclude
    when:
      - label:
          - "skip-changelog"
          - "dependencies"
  - type: version-resolver
    semver-increment: "major"
    when:
      - label:
          - "major"
          - "breaking-change"
          - "breaking"
  - type: version-resolver
    semver-increment: "minor"
    when:
      - label:
          - "minor"
          - "enhancement"
          - "feature"
          - "new-feature"
  - type: version-resolver
    semver-increment: "patch"
    when:
      - label:
          - "patch"
          - "bug"
          - "fix"
          - "bugfix"
          - "dependencies"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'
no-changes-template: "No changes since last release."
template: |
  ## Changes

  $CHANGES

  ## Contributors

  $CONTRIBUTORS

  ---

  **Full Changelog**: https://github.com/muhammad-fiaz/logly/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
